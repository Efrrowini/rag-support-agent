<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VortexIQ Support Chat</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h2 { color: #333; }
    #chat { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; height: 400px; overflow-y: auto; margin-bottom: 12px; }
    .user { text-align: right; margin: 8px 0; }
    .user span { background: #4F46E5; color: white; padding: 8px 12px; border-radius: 12px 12px 2px 12px; display: inline-block; max-width: 80%; }
    .bot { text-align: left; margin: 8px 0; }
    .bot span { background: #E5E7EB; color: #111; padding: 8px 12px; border-radius: 12px 12px 12px 2px; display: inline-block; max-width: 80%; }
    .fallback span { background: #FEF3C7; color: #92400E; }
    #status { font-size: 12px; color: #6B7280; margin-bottom: 8px; }
    #input-row { display: flex; gap: 8px; }
    #msg { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    #send { padding: 10px 20px; background: #4F46E5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #send:disabled { background: #9CA3AF; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>VortexIQ Support Chat</h2>
  <div id="status">Waking up server...</div>
  <div id="chat"></div>
  <div id="input-row">
    <input id="msg" type="text" placeholder="Ask a question..." disabled />
    <button id="send" disabled>Send</button>
  </div>

  <script>
    const BACKEND = "https://web-production-215bcf.up.railway.app";
    const sessionId = "test-session-" + Math.random().toString(36).substr(2, 9);
    const chat = document.getElementById("chat");
    const status = document.getElementById("status");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    let ws = null;
    let typingEl = null;
    let reconnectAttempts = 0;

    function addMessage(html, className) {
      const div = document.createElement("div");
      div.className = className;
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function connect() {
      status.textContent = "Waking up server...";
      status.style.color = "#BA7517";
      msgInput.disabled = true;
      sendBtn.disabled = true;
      pollReady();
    }

    function pollReady() {
      fetch(`${BACKEND}/ready`)
        .then(r => r.json())
        .then(data => {
          if (data.ready) {
            status.textContent = "Server ready — connecting...";
            setTimeout(openWebSocket, 500);
          } else {
            status.textContent = "Server starting up...";
            setTimeout(pollReady, 2000);
          }
        })
        .catch(() => {
          status.textContent = "Waiting for server...";
          setTimeout(pollReady, 3000);
        });
    }

    function openWebSocket() {
      ws = new WebSocket(`wss://web-production-215bcf.up.railway.app/chat/${sessionId}`);

      ws.onopen = () => {
        reconnectAttempts = 0;
        status.textContent = "Connected — Session: " + sessionId;
        status.style.color = "#059669";
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (typingEl) { typingEl.remove(); typingEl = null; }

        if (data.type === "typing") {
          typingEl = addMessage(`<span style="color:#9CA3AF;font-style:italic">VortexIQ is typing...</span>`, "bot");

        } else if (data.type === "escalate") {
          const banner = document.createElement("div");
          banner.style.cssText = "background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:12px;margin:10px 0;text-align:center;font-size:13px;color:#92400E;font-weight:500;";
          banner.innerHTML = "🔴 " + data.answer;
          chat.appendChild(banner);
          msgInput.disabled = true;
          sendBtn.disabled = true;
          msgInput.placeholder = "Chat ended — connected to human agent";
          status.textContent = "Escalated to human agent";
          status.style.color = "#DC2626";

        } else if (data.type === "agent_message") {
          addMessage(`<span style="background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7">👤 Agent: ${data.answer}</span>`, "bot");

        } else {
          let html = `<span>${data.answer}</span>`;
          if (data.source && !data.fallback) {
            html += `<div style="font-size:11px;color:#9CA3AF;margin-top:4px;padding-left:4px">📄 ${data.source}</div>`;
          }
          addMessage(html, "bot" + (data.fallback ? " fallback" : ""));
        }
      };

      ws.onclose = () => {
        msgInput.disabled = true;
        sendBtn.disabled = true;
        if (reconnectAttempts < 3) {
          reconnectAttempts++;
          status.textContent = `Disconnected — retrying (${reconnectAttempts}/3)...`;
          status.style.color = "#BA7517";
          setTimeout(connect, 3000);
        } else {
          status.textContent = "Connection failed — please refresh";
          status.style.color = "#DC2626";
        }
      };

      ws.onerror = () => { ws.close(); };
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      addMessage(`<span>${text}</span>`, "user");
      chat.scrollTop = chat.scrollHeight;
      ws.send(text);
      msgInput.value = "";
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };

    connect();
  </script>
</body>
</html>
