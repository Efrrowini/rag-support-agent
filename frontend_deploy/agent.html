<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VortexIQ — Agent Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0f0f;
    --surface:#111918;
    --surface2:#162020;
    --surface3:#1a2828;
    --teal:#00c9a7;
    --teal-dim:#00c9a715;
    --teal-glow:0 0 20px #00c9a730;
    --text:#e8f0ef;
    --text-muted:#6b8a86;
    --border:#1e2e2c;
    --border-teal:#00c9a730;
    --danger:#ef4444;
    --warning:#c9a700;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* Topbar */
  .topbar{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-logo{width:32px;height:32px;border-radius:8px;background:var(--teal-dim);border:1px solid var(--teal);display:flex;align-items:center;justify-content:center;box-shadow:var(--teal-glow)}
  .topbar-logo svg{width:16px;height:16px;fill:var(--teal)}
  .topbar-title{font-size:15px;font-weight:600}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .badge{background:var(--danger);color:white;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
  .refresh-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .2s}
  .refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
  .last-refresh{font-size:11px;color:var(--text-muted)}

  /* Layout */
  .container{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden}

  /* Sidebar */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-head-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
  .filter-row{display:flex;gap:4px}
  .filter-btn{flex:1;font-size:11px;padding:5px 0;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;text-align:center}
  .filter-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
  .session-list{flex:1;overflow-y:auto}
  .session-list::-webkit-scrollbar{width:3px}
  .session-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .no-sessions{padding:32px 16px;text-align:center;color:var(--text-muted);font-size:13px}
  .session-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
  .session-item:hover{background:var(--surface2)}
  .session-item.active{background:var(--teal-dim);border-left:2px solid var(--teal)}
  .session-item.resolved{opacity:.45}
  .session-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .session-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
  .sent-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
  .sent-neg{background:#ef4444}
  .sent-pos{background:var(--teal)}
  .sent-neu{background:#c9a700}

  /* Main panel */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .main-header{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .main-header-info h2{font-size:14px;font-weight:600;color:var(--text)}
  .main-header-info span{font-size:11px;color:var(--text-muted)}
  .resolve-btn{font-size:12px;padding:7px 16px;border-radius:8px;border:none;background:var(--teal);color:#000;font-weight:600;cursor:pointer;transition:all .2s}
  .resolve-btn:hover{opacity:.85}
  .resolve-btn:disabled{background:var(--surface2);color:var(--text-muted);cursor:not-allowed}

  /* Chat area */
  .chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
  .chat-area::-webkit-scrollbar{width:3px}
  .chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-muted)}
  .empty-icon{width:48px;height:48px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--border-teal);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
  .empty-icon svg{width:22px;height:22px;fill:var(--text-muted)}
  .msg-wrapper{display:flex;flex-direction:column;gap:4px}
  .msg-label{font-size:10px;color:var(--text-muted);padding:0 4px;display:flex;align-items:center;gap:6px}
  .sent-badge{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500}
  .sb-neg{background:#2a0a0a;color:#ef9494;border:1px solid #3a1010}
  .sb-pos{background:#0a1e1a;color:#00c9a7;border:1px solid #00c9a720}
  .sb-neu{background:#1a1400;color:#c9a700;border:1px solid #2a2000}
  .msg-row{display:flex}
  .msg-row.user{justify-content:flex-end}
  .msg-row.assistant,.msg-row.agent{justify-content:flex-start}
  .bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6}
  .msg-row.user .bubble{background:var(--teal);color:#000;border-radius:14px 14px 4px 14px;font-weight:500}
  .msg-row.assistant .bubble{background:var(--surface2);color:var(--text);border-radius:14px 14px 14px 4px;border:1px solid var(--border)}
  .msg-row.agent .bubble{background:#0d1f1a;color:var(--teal);border-radius:14px 14px 14px 4px;border:1px solid var(--border-teal)}
  .resolved-notice{background:#0a1e1a;border:1px solid var(--border-teal);border-radius:10px;padding:10px 14px;text-align:center;font-size:12px;color:var(--teal);margin:4px 0}

  /* Reply bar */
  .reply-bar{padding:14px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
  .reply-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:10px 18px;font-size:13px;color:var(--text);outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
  .reply-bar input::placeholder{color:var(--text-muted)}
  .reply-bar input:focus{border-color:var(--teal)}
  .reply-bar input:disabled{opacity:.4}
  .send-reply-btn{padding:10px 20px;border-radius:24px;border:none;background:var(--teal);color:#000;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
  .send-reply-btn:hover{opacity:.85}
  .send-reply-btn:disabled{background:var(--surface2);color:var(--text-muted);cursor:not-allowed}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    </div>
    <span class="topbar-title">VortexIQ Agent Dashboard</span>
    <span class="badge" id="count-badge">0</span>
  </div>
  <div class="topbar-right">
    <span class="last-refresh" id="last-refresh"></span>
    <button class="refresh-btn" onclick="loadSessions()">Refresh</button>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-head-title">Escalated Sessions</div>
      <div class="filter-row">
        <button class="filter-btn active" id="f-all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" id="f-open" onclick="setFilter('open')">Open</button>
        <button class="filter-btn" id="f-resolved" onclick="setFilter('resolved')">Resolved</button>
      </div>
    </div>
    <div class="session-list" id="session-list">
      <div class="no-sessions">No escalated sessions yet</div>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="main-header-info">
        <h2 id="main-title">Select a session</h2>
        <span id="main-meta">Choose from the sidebar to view conversation</span>
      </div>
      <button class="resolve-btn" id="resolve-btn" disabled onclick="resolveSession()">Mark Resolved</button>
    </div>
    <div class="chat-area" id="chat-area">
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg></div>
        <div style="font-size:14px;font-weight:500">No session selected</div>
        <div style="font-size:12px">Select an escalated session from the sidebar</div>
      </div>
    </div>
    <div class="reply-bar">
      <input id="reply-input" type="text" placeholder="Type your reply as agent..." disabled />
      <button class="send-reply-btn" id="reply-btn" disabled onclick="sendReply()">Send Reply</button>
    </div>
  </div>
</div>

<script>
const BASE = "https://web-production-215bcf.up.railway.app";
let currentSession = null, allSessions = {}, currentFilter = "all";
let resolvedSessions = new Set(JSON.parse(localStorage.getItem("resolved_sessions") || "[]"));

const AGENT_PASSWORD = "vortexiq-agent-2026";
if(localStorage.getItem("agent_auth") !== AGENT_PASSWORD){
  const pwd = prompt("Agent password:");
  if(pwd !== AGENT_PASSWORD){
    document.body.innerHTML = "<div style='padding:40px;font-family:Inter,sans-serif;color:#ef4444;font-size:16px;background:#0a0f0f;height:100vh'>Access denied.</div>";
    throw new Error("Unauthorized");
  }
  localStorage.setItem("agent_auth", pwd);
}

function setFilter(f){
  currentFilter = f;
  ["all","open","resolved"].forEach(x=>document.getElementById("f-"+x).classList.toggle("active", x===f));
  renderList();
}

function sentDot(score){
  if(score===undefined) return "";
  const cls = score < -0.2 ? "sent-neg" : score > 0.2 ? "sent-pos" : "sent-neu";
  return `<span class="sent-dot ${cls}"></span>`;
}

function sentBadge(score){
  if(score===undefined) return "";
  const cls = score < -0.2 ? "sb-neg" : score > 0.2 ? "sb-pos" : "sb-neu";
  const emoji = score < -0.2 ? "😠" : score > 0.2 ? "😊" : "😐";
  return `<span class="sent-badge ${cls}">${emoji} ${score.toFixed(2)}</span>`;
}

async function loadSessions(){
  try{
    const res = await fetch(`${BASE}/sessions`);
    const data = await res.json();
    allSessions = data.escalated_sessions || {};
    document.getElementById("last-refresh").textContent = "Updated " + new Date().toLocaleTimeString();
    renderList();
    if(currentSession && allSessions[currentSession]) renderChat(currentSession);
  } catch(e){}
}

function renderList(){
  const list = document.getElementById("session-list");
  const entries = Object.entries(allSessions).filter(([sid])=>{
    if(currentFilter==="resolved") return resolvedSessions.has(sid);
    if(currentFilter==="open") return !resolvedSessions.has(sid);
    return true;
  });
  const openCount = Object.keys(allSessions).filter(s=>!resolvedSessions.has(s)).length;
  document.getElementById("count-badge").textContent = openCount;
  if(!entries.length){ list.innerHTML = `<div class="no-sessions">No ${currentFilter==="all"?"":""+currentFilter+" "}sessions</div>`; return; }
  list.innerHTML = entries.map(([sid, session])=>{
    const resolved = resolvedSessions.has(sid);
    const negCount = session.history.filter(m=>m.sentiment!==undefined&&m.sentiment<-0.2).length;
    const dot = negCount > 0 ? "sent-neg" : "sent-pos";
    return `<div class="session-item ${sid===currentSession?"active":""} ${resolved?"resolved":""}" onclick="selectSession('${sid}')">
      <div class="session-name">${sid}</div>
      <div class="session-meta"><span>${sentDot({sent_neg:true,sent_pos:false}[dot]===undefined?0:1)} ${session.history.length} msgs</span><span>${resolved?"✓ Resolved":negCount+" negative"}</span></div>
    </div>`;
  }).join("");
}

function selectSession(sid){
  currentSession = sid;
  renderList();
  renderChat(sid);
  const resolved = resolvedSessions.has(sid);
  document.getElementById("reply-input").disabled = resolved;
  document.getElementById("reply-btn").disabled = resolved;
  document.getElementById("resolve-btn").disabled = resolved;
}

function renderChat(sid){
  const session = allSessions[sid];
  if(!session) return;
  document.getElementById("main-title").textContent = sid;
  document.getElementById("main-meta").textContent = session.history.length + " messages";
  const area = document.getElementById("chat-area");
  const resolved = resolvedSessions.has(sid);
  let html = resolved ? `<div class="resolved-notice">✓ Session resolved</div>` : "";
  html += session.history.map(msg=>{
    const badge = msg.role==="user" ? sentBadge(msg.sentiment) : "";
    return `<div class="msg-wrapper">
      <div class="msg-label">${msg.role} ${badge}</div>
      <div class="msg-row ${msg.role}"><div class="bubble">${msg.content}</div></div>
    </div>`;
  }).join("");
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

async function sendReply(){
  const input = document.getElementById("reply-input");
  const text = input.value.trim();
  if(!text || !currentSession) return;
  await fetch(`${BASE}/agent-reply/${currentSession}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:text})});
  input.value = "";
  await loadSessions();
  if(currentSession) renderChat(currentSession);
}

function resolveSession(){
  if(!currentSession) return;
  resolvedSessions.add(currentSession);
  localStorage.setItem("resolved_sessions", JSON.stringify([...resolvedSessions]));
  document.getElementById("reply-input").disabled = true;
  document.getElementById("reply-btn").disabled = true;
  document.getElementById("resolve-btn").disabled = true;
  renderList(); renderChat(currentSession);
}

document.getElementById("reply-input").onkeydown = e=>{ if(e.key==="Enter") sendReply(); };
loadSessions();
setInterval(loadSessions, 5000);
</script>
</body>
</html>
